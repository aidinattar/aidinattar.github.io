name: Deploy Franklin Site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Setup Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: '1.10'

      - name: Instantiate project
        run: julia --project=. -e 'using Pkg; Pkg.instantiate()'

      - name: Build Franklin site
        run: julia --project=. -e 'using Franklin; optimize(clear=true)'

      - name: Copy static verification and robots files
        run: |
          cp google4083dfcedcc5d554.html __site/google4083dfcedcc5d554.html
          cp robots.txt __site/robots.txt

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./__site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
